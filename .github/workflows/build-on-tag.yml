name: Build on Tag (Private Repo)

# This workflow is triggered when a tag is pushed to the private repository
# It uses repository_dispatch event, which can be triggered via GitHub API

on:
  repository_dispatch:
    types: [release-build]

env:
  PRIVATE_REPO: leaperone/MultiPost-Desktop
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # 先创建 Draft Release，后续构建会直接发布到这个 Release
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create Draft Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.version }}
          name: MultiPost Desktop ${{ github.event.client_payload.version }}
          draft: true
          prerelease: ${{ github.event.client_payload.prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # electron-builder 直接发布到 GitHub Release
      # 会自动生成 latest-mac.yml 文件
      - name: Build and Publish macOS (x64)
        run: pnpm build:mac -- --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish macOS (arm64)
        run: pnpm build:mac -- --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ github.event.client_payload.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # electron-builder 直接发布到 GitHub Release
      # 会自动生成 latest.yml 文件
      - name: Build and Publish Windows
        run: pnpm build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 所有构建完成后，将 Draft Release 发布为正式版
  publish-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const draftRelease = releases.find(r => r.tag_name === '${{ github.event.client_payload.version }}' && r.draft);

            if (draftRelease) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draftRelease.id,
                draft: false
              });
              console.log(`Published release: ${draftRelease.name}`);
            } else {
              console.log('No draft release found to publish');
            }
