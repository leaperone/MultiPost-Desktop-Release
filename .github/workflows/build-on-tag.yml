name: Build on Tag

on:
  repository_dispatch:
    types: [release-build]

env:
  PRIVATE_REPO: leaperone/MultiPost
  NODE_VERSION: '20'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.version }}
          name: MultiPost Desktop ${{ github.event.client_payload.version }}
          draft: true
          prerelease: ${{ github.event.client_payload.prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: desktop-${{ github.event.client_payload.version }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nick-fields/retry@v2
        name: Build, sign, notarize and publish macOS
        with:
          timeout_minutes: 30
          max_attempts: 2
          command: cd apps/desktop && pnpm build:mac -- --x64 --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts for S3
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/latest-mac.yml
            apps/desktop/dist/*.blockmap
          retention-days: 1

  build-windows:
    needs: create-release
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: desktop-${{ github.event.client_payload.version }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Windows
        run: pnpm build:win -- --publish always
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts for S3
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/latest.yml
            apps/desktop/dist/*.blockmap
          retention-days: 1

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: desktop-${{ github.event.client_payload.version }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Linux
        run: pnpm build:linux -- --publish always
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts for S3
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.snap
            apps/desktop/dist/latest-linux.yml
            apps/desktop/dist/*.blockmap
          retention-days: 1

  upload-to-s3:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BITIFUL_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BITIFUL_SECRET_ACCESS_KEY }}
          S3_BUCKET: 2someone-web-static
          S3_PATH: release/multipost-desktop
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          S3_ENDPOINT="https://s3.bitiful.net"
          export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY S3_BUCKET S3_PATH S3_ENDPOINT

          # Build the upload manifest as "<src-path>|<dest-key>" lines.
          # Versioned files (dmg/zip/exe/AppImage/deb/snap), yml manifests and
          # blockmaps keep their basename; the fixed "*-latest.*" download
          # aliases point at the matching artifact.
          {
            find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.snap" -o -name "latest*.yml" -o -name "*.blockmap" \) \
              | while read -r f; do echo "$f|$(basename "$f")"; done

            for spec in "*.dmg|MultiPost-mac-latest.dmg" "*-mac.zip|MultiPost-mac-latest.zip" "*.exe|MultiPost-Setup-latest.exe" "*.AppImage|MultiPost-latest.AppImage" "*.deb|MultiPost-latest.deb"; do
              src=$(find artifacts -name "${spec%%|*}" | head -1)
              [ -n "$src" ] && echo "$src|${spec##*|}"
            done
          } > /tmp/uploads.txt

          echo "=== Uploading $(wc -l < /tmp/uploads.txt) objects to S3 (parallel, 6 at a time) ==="
          cat /tmp/uploads.txt

          # Parallel upload. xargs exits non-zero if any cp fails, which fails the
          # step under the default `set -eo pipefail` — keeps fail-fast behaviour
          # while avoiding the old "one slow file blocks the queue" serial hang.
          xargs -a /tmp/uploads.txt -P 6 -d '\n' -I {} bash -c '
            spec="$1"; src="${spec%%|*}"; dst="${spec##*|}"
            echo "Uploading $dst ..."
            aws s3 cp "$src" "s3://$S3_BUCKET/$S3_PATH/$dst" \
              --endpoint-url "$S3_ENDPOINT" --acl public-read --no-verify-ssl
          ' _ {}

          echo "All uploads complete."

      - name: Cleanup old versions on S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BITIFUL_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BITIFUL_SECRET_ACCESS_KEY }}
          S3_BUCKET: 2someone-web-static
          S3_PATH: release/multipost-desktop
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          # S3 only keeps: current version + latest aliases + yml manifests
          # Historical versions are preserved on GitHub Releases
          S3_ENDPOINT="https://s3.bitiful.net"
          S3_OPTS="--endpoint-url $S3_ENDPOINT --no-verify-ssl"
          VER="${VERSION#v}"

          aws s3 ls "s3://$S3_BUCKET/$S3_PATH/" $S3_OPTS 2>/dev/null \
            | sed 's/^[0-9-]* [0-9:]* *[0-9]* //' \
            | grep -v '^$' > /tmp/s3_all.txt

          echo "Total files on S3: $(wc -l < /tmp/s3_all.txt)"
          echo "Current version: ${VER}"

          > /tmp/s3_delete.txt
          while IFS= read -r fname; do
            [ -z "$fname" ] && continue
            keep=false
            case "$fname" in *"${VER}"*) keep=true ;; esac
            case "$fname" in
              latest-mac.yml|latest.yml|latest-linux.yml) keep=true ;;
              MultiPost-mac-latest.*) keep=true ;;
              MultiPost-Setup-latest.*) keep=true ;;
              MultiPost-latest.*) keep=true ;;
            esac
            [ "$keep" = "false" ] && echo "$fname" >> /tmp/s3_delete.txt
          done < /tmp/s3_all.txt

          if [ ! -s /tmp/s3_delete.txt ]; then
            echo "Nothing to delete."
            exit 0
          fi

          echo "=== Deleting $(wc -l < /tmp/s3_delete.txt) old files ==="
          while IFS= read -r fname; do
            [ -z "$fname" ] && continue
            echo "  rm: $fname"
            aws s3 rm "s3://$S3_BUCKET/$S3_PATH/$fname" $S3_OPTS 2>/dev/null
          done < /tmp/s3_delete.txt
          echo "Cleanup complete"

  refresh-cdn:
    needs: upload-to-s3
    runs-on: ubuntu-latest
    steps:
      - name: Refresh S4 CDN cache for update manifests
        env:
          BITIFUL_API_TOKEN: ${{ secrets.BITIFUL_API_TOKEN }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -eo pipefail
          if [ -z "$BITIFUL_API_TOKEN" ]; then
            echo "::error::BITIFUL_API_TOKEN secret is not set — cannot refresh CDN cache."
            echo "Set it once: gh secret set BITIFUL_API_TOKEN --org leaperone --visibility all"
            exit 1
          fi

          CDN_BASE="https://static.2some.ren/release/multipost-desktop"

          # latest*.yml manifests and the fixed "*-latest.*" download aliases keep
          # stable filenames, so the S4 CDN serves them with a long (30d) TTL —
          # clients keep seeing the previous release until the edge entry expires.
          # A directory purge invalidates every object under the prefix at once,
          # so the new manifests/aliases are served right after a release instead
          # of waiting up to 30 days for the stale edge entry to expire.
          echo "Purging CDN cache for $CDN_BASE/ ..."
          http=$(curl -s -o /tmp/refresh_resp.txt -w '%{http_code}' \
            -X POST "https://api.bitiful.com/cdn/cache/refresh" \
            -H "Authorization: $BITIFUL_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"directory\",\"url_list\":[\"$CDN_BASE/\"]}")
          echo "Refresh API HTTP $http: $(cat /tmp/refresh_resp.txt)"
          [ "$http" = "200" ] || { echo "::error::CDN cache refresh failed"; exit 1; }

          # Edge propagation is async (30s–5min); poll as a best-effort check and
          # surface the served version without failing the job on a stale read.
          VER="${VERSION#v}"
          echo "Expecting version: $VER"
          sleep 30
          for f in latest-mac.yml latest.yml latest-linux.yml; do
            got=$(curl -s "$CDN_BASE/$f" | grep -E '^version:' | awk '{print $2}' || true)
            echo "  $f -> ${got:-<none>}"
          done
          echo "CDN refresh requested; edges fully propagate within a few minutes."

  publish-release:
    needs: upload-to-s3
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const draftRelease = releases.find(r =>
              r.tag_name === '${{ github.event.client_payload.version }}' && r.draft
            );

            if (draftRelease) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draftRelease.id,
                draft: false
              });
              console.log(`Published release: ${draftRelease.name}`);
            } else {
              console.log('No draft release found to publish');
            }
